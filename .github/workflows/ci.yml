name: CI & Publish
on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - run: |
          pip install . pytest pytest-cov      
      - name: Run tests
        run: pytest
  docs:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install .  pdoc; python -m pdoc -o docs_out kagravity
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs_out/kagravity

  publish:
    needs: test
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/checkout@v4      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          pip install build
          python -m build
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
